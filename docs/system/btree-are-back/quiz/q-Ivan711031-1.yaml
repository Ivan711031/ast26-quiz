author: Ivan711031
date: 2026-05-26
question: |
  在實作支援變長度鍵值的 B-Tree 時，為了節省空間與增進快取效率，系統會採用 Prefix Truncation 技術。當一個 leaf node 準備進行前綴截斷時，系統應該如何最高效且穩定地決定該節點內所有鍵值的最長共同前綴？
options:
  - text: "比對該節點的 lower fence key 與 upper fence key 來決定共同前綴長度。"
    correct: true
    explanation: |
      在 B-Tree 中，任何插入節點的鍵值都必定介於 lower fence 與 upper fence 之間。因此，兩者的共同前綴必定是該節點內所有鍵值的共同前綴。此方法不僅計算時間為 O(1)，而且前綴長度不會因為節點內部鍵值的插入或刪除而改變，避免了昂貴的資料重寫開銷。
  - text: "比對該節點內目前儲存的第一個鍵值（最小值）與最後一個鍵值（最大值）來決定。"
    explanation: |
      雖然節點內的資料是有序的，但依賴目前存在的鍵值來決定前綴會導致不穩定性。如果刪除或插入新的邊界鍵值，前綴長度可能會發生改變，這會迫使系統重寫節點內所有的資料，在高效能儲存系統中會引發極大的效能災難。
  - text: "在每次發生鍵值變動時，線性掃描節點內所有的鍵值並重新計算最長共同前綴。"
    explanation: |
      線性掃描所有鍵值的時間複雜度與節點內的資料量成正比，這在講求極致效能的資料庫中效率極低；此外，這與依賴現有最大最小值的做法一樣，會面臨前綴長度不穩定的問題，導致頻繁的記憶體搬移。
  - text: "在節點內部維護一個額外的 Trie 資料結構，並直接從根節點提取共同前綴。"
    explanation: |
      在以 page 為基礎的 B-Tree 節點中，通常會採用 Slotted Page 格式來確保記憶體連續性與最佳的 CPU 快取命中率。引入 Trie 結構會產生大量指標與分散的記憶體配置，完全破壞原有的連續性優勢並增加額外的空間負擔。